<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CoinPilotX" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <title>Offline | CoinPilotXAI Inc.</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f2fbff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 229, 255, 0.16), transparent 28%),
        linear-gradient(135deg, #050b14, #07111e);
    }
    .card {
      width: min(100%, 620px);
      padding: 30px;
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 14px;
      background: rgba(13, 22, 39, 0.88);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      text-align: center;
    }
    img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      border-radius: 16px;
      filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.24));
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(30px, 7vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      color: #9fb5c0;
      font-size: 17px;
      line-height: 1.6;
    }
    button, a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
      padding: 12px 18px;
      border-radius: 8px;
      color: #06101b;
      background: linear-gradient(135deg, #36e58f, #00e5ff);
      font-weight: 850;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }
    .status { min-height: 24px; }
  </style>
</head>
<body>
  <main class="card">
    <img src="{{ url_for('static', filename='Coinpilot Logo/NewLogo.png') }}" alt="CoinPilotXAI Inc. logo" />
    <h1>You’re offline.</h1>
    <p>You’re offline. CoinPilotXAI Inc. needs an internet connection for live intelligence.</p>
    <p>Reconnect to load market data, wallet checks, Sports Edge, and Telegram-powered intelligence.</p>
    <p class="status" data-health-status>Checking connection...</p>
    <button type="button" data-try-again>Try Again</button>
  </main>
  <script>
    (function () {
      var failures = 0;
      var status = document.querySelector("[data-health-status]");
      var button = document.querySelector("[data-try-again]");

      async function checkHealth() {
        console.log("[CoinPilotXAI PWA] navigator.onLine state", navigator.onLine);
        if (navigator.onLine === false) {
          failures += 1;
          if (status) status.textContent = "Browser reports offline. Waiting for connection...";
          console.log("[CoinPilotXAI PWA] offline mode entered");
          return false;
        }
        try {
          var response = await fetch("/health", { cache: "no-store" });
          console.log("[CoinPilotXAI PWA] /health response status", response.status);
          if (response.ok) {
            failures = 0;
            if (status) status.textContent = "Connection restored. Reloading...";
            console.log("[CoinPilotXAI PWA] offline mode exited");
            window.location.href = "/";
            return true;
          }
        } catch (error) {
          console.log("[CoinPilotXAI PWA] /health fetch failed", error && error.message ? error.message : error);
        }
        failures += 1;
        if (status) status.textContent = failures >= 2 ? "Still offline. Retrying..." : "Checking again...";
        return false;
      }

      if (button) {
        button.addEventListener("click", checkHealth);
      }
      window.addEventListener("online", checkHealth);
      window.setInterval(checkHealth, 5000);
      checkHealth();
    })();
  </script>
</body>
</html>
