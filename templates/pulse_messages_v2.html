<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Pulse Messages v2 | CoinPilotXAI</title>
  <link rel="stylesheet" href="/static/css/pulse_messages_v2.css">
</head>
<body data-comm-v2-enabled="{{ 'true' if enabled else 'false' }}">
  <main class="comm-shell" data-current-user-id="{{ current_user.user_id }}">
    <aside class="comm-list" aria-label="Conversations">
      <header class="comm-toolbar">
        <a class="icon-btn" href="/pulse/messages" title="Back to current messages" aria-label="Back to current messages">&lt;</a>
        <h1>Messages</h1>
      </header>
      <div class="comm-actions" aria-label="Create chats">
        <button class="primary" type="button" data-open-new-chat>New Chat</button>
        <button type="button" data-open-new-group>Create Group</button>
      </div>
      <div class="comm-filter" role="tablist" aria-label="Conversation type">
        <button class="is-active" type="button" data-filter="all">All</button>
        <button type="button" data-filter="direct">DM</button>
        <button type="button" data-filter="group">Groups</button>
        <button type="button" data-filter="room">Rooms</button>
      </div>
      <section class="comm-items" data-conversations>
        <div class="empty-state">Pulse Communications 2.0 is staged behind a feature flag.</div>
      </section>
    </aside>

    <section class="comm-thread" aria-label="Message thread">
      <header class="thread-head">
        <button class="icon-btn mobile-only" type="button" data-mobile-list title="Conversations" aria-label="Conversations">=</button>
        <div>
          <h2 data-thread-title>Select a conversation</h2>
          <p data-thread-subtitle>Search for someone or create a group to start chatting.</p>
        </div>
      </header>
      <div class="messages" data-messages>
        <div class="empty-state">Search for someone or create a group to start chatting.</div>
      </div>
      <form class="composer" data-composer>
        <input type="file" data-file hidden>
        <button class="icon-btn" type="button" data-pick-file title="Attach media" aria-label="Attach media">+</button>
        <input data-message-input autocomplete="off" placeholder="Write a message">
        <button type="submit">Send</button>
      </form>
      <div class="composer-status" data-status role="status" aria-live="polite"></div>
    </section>

    <div class="comm-modal" data-modal="new-chat" hidden>
      <div class="comm-modal-panel" role="dialog" aria-modal="true" aria-labelledby="newChatTitle">
        <header>
          <h2 id="newChatTitle">New Chat</h2>
          <button class="icon-btn" type="button" data-close-modal aria-label="Close">x</button>
        </header>
        <label>
          Search people
          <input data-person-search autocomplete="off" placeholder="Name, username, or email">
        </label>
        <div class="people-results" data-person-results></div>
        <div class="modal-actions">
          <button type="button" data-close-modal>Cancel</button>
        </div>
      </div>
    </div>

    <div class="comm-modal" data-modal="new-group" hidden>
      <div class="comm-modal-panel" role="dialog" aria-modal="true" aria-labelledby="newGroupTitle">
        <header>
          <h2 id="newGroupTitle">Create Group</h2>
          <button class="icon-btn" type="button" data-close-modal aria-label="Close">x</button>
        </header>
        <label>
          Group name
          <input data-group-title autocomplete="off" placeholder="Group name">
        </label>
        <div class="group-photo-placeholder" aria-hidden="true">Group photo</div>
        <label>
          Add members
          <input data-group-person-search autocomplete="off" placeholder="Search people">
        </label>
        <div class="people-results" data-group-person-results></div>
        <div class="selected-people" data-selected-people></div>
        <div class="modal-actions">
          <button type="button" data-close-modal>Cancel</button>
          <button class="primary" type="button" data-create-group>Start Group</button>
        </div>
      </div>
    </div>
  </main>
  <script src="/static/js/pulse_messages_v2.js" defer></script>
</body>
</html>
